name: API Tests — play-qa.com

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      tags:
        description: 'Cucumber tag filter (e.g. @Smoke or @AllTests)'
        required: false
        default: '@Run'

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: |
          TAG="${{ github.event.inputs.tags || '@Run' }}"
          mvn test -Dcucumber.filter.tags="$TAG" -DbaseUrl="${{ vars.BASE_URL || 'https://www.play-qa.com' }}"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: target/allure-results
          retention-days: 30

      - name: Upload Cucumber HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-${{ github.run_number }}
          path: target/cucumber-reports
          retention-days: 30
