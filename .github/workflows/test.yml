name: API Tests — play-qa.com

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run tests daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      tags:
        description: 'Cucumber tag filter (e.g. @Smoke or @AllTests)'
        required: false
        default: '@Run'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: |
          TAG="${{ github.event.inputs.tags || '@Run' }}"
          mvn test -Dcucumber.filter.tags="$TAG" -DbaseUrl="${{ vars.BASE_URL || 'https://www.play-qa.com' }}"

      - name: Generate Allure report
        if: always()
        run: mvn allure:report

      - name: Upload Allure results (raw)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: target/allure-results
          retention-days: 30

      - name: Upload Cucumber HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-${{ github.run_number }}
          path: target/cucumber-reports
          retention-days: 30

      - name: Prepare Allure report for Pages
        if: always() && github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/gh-pages/${{ github.run_number }}
          mkdir -p /tmp/gh-pages/latest
          cp -r target/site/allure-maven-plugin/. /tmp/gh-pages/${{ github.run_number }}/
          cp -r target/site/allure-maven-plugin/. /tmp/gh-pages/latest/

      - name: Deploy Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: /tmp/gh-pages
          keep_files: true
